    legend: { name: "Vera Wang", former: "Told at 40 that it was too late to start over", became: "Billionaire designer worn by every major celebrity", story: "We revisit Vera Wang on your second-to-last night because of what she said when asked about starting late: her only regret was worrying so long about it. The world she built — worth over a billion dollars, worn at every major red carpet — all came from ignoring the voice that said it was too late. Tomorrow you start ignoring that voice permanently." },
    rockclock: "Two days. In geological time, this is less than a nanosecond. In your personal time, it is absolutely everything."
  },
  "2026-5-7": {
    oneliner: "1 day — tomorrow. TOMORROW. The last shift. The final blast. The walk to the portal. One more sleep.",
    song: { title: "Beautiful Day", artist: "U2", reason: "Bono wrote this about gratitude for things you almost missed because you were looking somewhere else. Tomorrow is going to be a beautiful day. So is Saturday. So is every single day after that." },
    affirmation: "One more sleep. Tonight you go to bed an employee of that mine, and tomorrow evening you will never be that again. That is a profound thing. Honour how far you've come to reach this night. The version of you that started that job had no idea what they'd endure — and absolutely no idea how strong they'd prove to be. Sleep well. Tomorrow you walk out.",
    legend: { name: "Vera Wang — one final time", former: "Told by the world it was too late", became: "Proof that it is never, ever too late", story: "On your last night we come back to her one more time: when asked if she regrets starting at 40, she said her only regret was worrying so long about starting late. Stop counting the years you spent somewhere that wasn't right for you. Start counting the years ahead. She had more than 40 of them, and she spent every one building something extraordinary. So will you." },
    rockclock: "Last night. In seismic terms, tomorrow registers a 10.0 on the personal Richter scale — the ground-shaking, life-changing, freedom-bringing kind."
  },
  "2026-5-8": {
    oneliner: "TODAY IS THE DAY. Put your boots on one last time, walk out those gates, and don't look back. You absolute legend.",
    song: { title: "Free Fallin'", artist: "Tom Petty", reason: "Tom Petty said this song was about pure liberation — no strings, no obligations, just open air. That is your entire day today. Free. Fallin'. Into the best chapter of your life." },
    affirmation: "Today is May 8th. Today is the day. Whatever you feel right now — excited, emotional, relieved, terrified, triumphant, or all of them at once — every single one of those feelings is earned, valid, and real. You did something hard. You stayed when leaving felt impossible, and you left when staying did. Walk out today with your head as high as every ridge line you've ever stood on. The view from here is extraordinary.",
    legend: { name: "You", former: "Geology Superintendent, gold mine, too long", became: "Whoever the hell you decide to be next", story: "On May 8th, 2026, a geology superintendent with years of hard-won expertise, unshakeable technical knowledge, and a resilience most people couldn't fathom, walked out of a gold mine for the last time. The next chapter hadn't been written yet. That was entirely the point. To be continued — brilliantly." },
    rockclock: "Today the mine loses its best asset. Today you reclaim yours. Go. Get out of there. We'll see you on the surface. 💎"
  }
};

const TARGET = new Date('2026-05-08T17:00:00');
const START  = new Date('2026-04-22T00:00:00');
const COLORS = ['#FFD700','#FF6B9D','#00F5FF','#BF5FFF','#39FF14','#FF6B6B','#FFEAA7','#98FB98'];

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(console.warn);

// Neon orbs
[{c:'#BF5FFF',s:500,t:'2%',l:'-8%',d:'5s'},{c:'#00F5FF',s:420,t:'18%',l:'68%',d:'7s'},{c:'#FF6B9D',s:360,t:'52%',l:'4%',d:'4s'},{c:'#FFD700',s:300,t:'68%',l:'62%',d:'6.5s'},{c:'#39FF14',s:260,t:'33%',l:'38%',d:'8s'}].forEach(o=>{
  const d=document.createElement('div'); d.className='neon-orb';
  d.style.cssText=`width:${o.s}px;height:${o.s}px;background:${o.c};top:${o.t};left:${o.l};--dur:${o.d}`;
  document.getElementById('neonBg').appendChild(d);
});

// Confetti
for(let i=0;i<70;i++){
  const p=document.createElement('div'); p.className='piece';
  const sz=6+Math.random()*10,circle=Math.random()>.5;
  p.style.cssText=`left:${Math.random()*100}%;width:${circle?sz:sz*.6}px;height:${sz}px;background:${COLORS[~~(Math.random()*COLORS.length)]};border-radius:${circle?'50%':'2px'};animation-duration:${3+Math.random()*5}s;animation-delay:${Math.random()*7}s`;
  document.getElementById('confetti').appendChild(p);
}

// Countdown
function timeLeft(){const d=TARGET-new Date();if(d<=0)return null;return{days:~~(d/864e5),hours:~~(d%864e5/36e5),minutes:~~(d%36e5/6e4),seconds:~~(d%6e4/1e3)};}
function pad(n){return String(n).padStart(2,'0');}
function tick(){
  const t=timeLeft();
  if(!t){document.getElementById('countdownSection').style.display='none';document.getElementById('freedomScreen').style.display='block';return;}
  document.getElementById('countdownRow').innerHTML=['days','hours','minutes','seconds'].map((l,i)=>`<div class="time-box" style="animation-delay:${i*.5}s"><span class="time-val">${pad(t[l])}</span><span class="time-lbl">${l}</span></div>`).join('');
  const pct=Math.min(100,Math.max(0,(new Date()-START)/(TARGET-START)*100));
  document.getElementById('progressWrap').innerHTML=`<div class="prog-labels"><span>Sentence served</span><span class="pct">${pct.toFixed(1)}% escaped 🚀</span><span>🏁 Freedom</span></div><div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>`;
}
tick(); setInterval(tick,1000);

// Install
let deferred=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferred=e;document.getElementById('installBar').style.display='block';});
window.addEventListener('appinstalled',()=>{document.getElementById('btnInstall').textContent='✅ Installed!';document.getElementById('btnInstall').disabled=true;});
setTimeout(()=>{document.getElementById('installBar').style.display='block';},1500);
document.getElementById('btnInstall').addEventListener('click',async()=>{
  if(!deferred){alert('On iPhone: tap the Share button ⬆️ then "Add to Home Screen" 📲\nOn Android: tap ⋮ menu then "Add to Home Screen"');return;}
  deferred.prompt();const{outcome}=await deferred.userChoice;
  if(outcome==='accepted'){document.getElementById('btnInstall').textContent='✅ Installed!';document.getElementById('btnInstall').disabled=true;}
  deferred=null;
});

// Notifications
function scheduleNext(){
  const t=timeLeft();if(!t)return;
  const tm=new Date();tm.setDate(tm.getDate()+1);tm.setHours(9,0,0,0);
  setTimeout(()=>{
    if(Notification.permission==='granted'){
      const msgs=[`${t.days} days to go! Keep your eyes on the exit shaft! ⛏️`,`Just ${t.days} more sleeps! Freedom is RIGHT there! 💎`,`${t.days} days left in the mine. Almost blasted through! 🎉`,`T-minus ${t.days} days! Start warming up that victory dance! 🕺`];
      new Notification('⛏️ Freedom Countdown!',{body:msgs[~~(Math.random()*msgs.length)],icon:'icon-192.png',tag:'freedom-daily',renotify:true});
      scheduleNext();
    }
  },tm-new Date());
}
const btnNotif=document.getElementById('btnNotif'),notifStatus=document.getElementById('notifStatus');
btnNotif.addEventListener('click',async()=>{
  if(!('Notification' in window)){notifStatus.textContent="Browser doesn't support notifications.";notifStatus.className='notif-status err';return;}
  const perm=await Notification.requestPermission();
  if(perm==='granted'){
    notifStatus.textContent='✅ Daily reminders set for 9am!';notifStatus.className='notif-status ok';
    btnNotif.textContent='🔔 Reminders On!';btnNotif.disabled=true;
    localStorage.setItem('notifsOn','1');scheduleNext();
    setTimeout(()=>{const t=timeLeft();new Notification('⛏️ Freedom Countdown activated!',{body:`${t?.days??0} days to go — see you on the other side! 🎊`,icon:'icon-192.png',tag:'freedom-test'});},3000);
  }else{notifStatus.textContent='Notifications blocked. Enable in browser settings.';notifStatus.className='notif-status err';}
});
if(localStorage.getItem('notifsOn')==='1'&&Notification.permission==='granted'){
  btnNotif.textContent='🔔 Reminders On!';btnNotif.disabled=true;
  notifStatus.textContent='✅ Daily reminders active at 9am';notifStatus.className='notif-status ok';
  scheduleNext();
}

// Cards
function getTodayContent(){const d=new Date();return DAILY_CONTENT[`${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`]||null;}
function renderCards(data){
  const defs=[
    {key:'oneliner',emoji:'💬',title:"Today's One-Liner",color:'#FFD700'},
    {key:'song',emoji:'🎵',title:'Song of the Day',color:'#00F5FF'},
    {key:'affirmation',emoji:'✨',title:'Words of Affirmation',color:'#DDA0DD'},
    {key:'legend',emoji:'🚀',title:'Late Bloomers & Legends',color:'#FF6B9D'},
    {key:'rockclock',emoji:'🪨',title:'Rock Bottom? Not Anymore.',color:'#96CEB4'},
  ];
  document.getElementById('cardsEl').innerHTML=defs.map((def,i)=>{
    let body='';
    if(def.key==='song'&&data.song){body=`<span class="song-title">${data.song.title}</span><span class="song-artist">${data.song.artist}</span><span class="song-reason">${data.song.reason}</span>`;}
    else if(def.key==='legend'&&data.legend){body=`<em class="legend-career">${data.legend.former} → ${data.legend.became}</em><strong class="legend-name">${data.legend.name}</strong><span class="legend-story">${data.legend.story}</span>`;}
    else{body=data[def.key]||'';}
    return `<div class="card" style="--c:${def.color};animation-delay:${i*.3}s"><div class="card-icon">${def.emoji}</div><div class="card-title">${def.title}</div><div class="card-body">${body}</div></div>`;
  }).join('');
  document.getElementById('cardsEl').style.display='flex';
}
const content=getTodayContent();
if(content){renderCards(content);}
else if(!timeLeft()){/* freedom screen handles it */}
else{document.getElementById('cardsEl').innerHTML='<div class="err-box"><p>No content for today — but freedom is still coming! 💎</p></div>';document.getElementById('cardsEl').style.display='flex';}
</script>
</body>
</html>
